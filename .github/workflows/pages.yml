name: deploy-dashboard-pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6
      - name: Prepare static artifact
        shell: bash
        run: |
          mkdir -p _site
          cp dashboard/index.html dashboard/data.json _site/
          touch _site/.nojekyll
          test -s _site/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  smoke:
    if: github.event_name != 'pull_request'
    needs: deploy
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Verify published dashboard contract
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.request

          base_url = os.environ["SITE_URL"].rstrip("/") + "/"
          error = None
          for attempt in range(1, 7):
              try:
                  suffix = f"?sha={os.environ['GITHUB_SHA']}&attempt={attempt}"
                  with urllib.request.urlopen(base_url + suffix, timeout=20) as response:
                      html = response.read().decode("utf-8")
                  with urllib.request.urlopen(base_url + "data.json" + suffix, timeout=20) as response:
                      data = json.load(response)
                  assert "Ampliado 7" in html
                  assert data["meta"]["schema_version"] == 2
                  assert data["meta"]["municipios"] == 7
                  assert data["meta"]["mesas"] == 1432
                  fingerprint = data["meta"]["procedencia"]["huella_contenido_sha256"]
                  assert len(fingerprint) == 64
                  assert all(character in "0123456789abcdef" for character in fingerprint)
                  assert len(data["analitica"]["ampliada"]["scatter"]["puntos"]) == 1432
                  print(f"PAGES_SMOKE_OK url={base_url} municipios=7 mesas=1432")
                  break
              except Exception as exc:  # noqa: BLE001 - evidencia del reintento remoto
                  error = exc
                  if attempt == 6:
                      raise
                  print(f"PAGES_SMOKE_RETRY attempt={attempt} error={exc}")
                  time.sleep(5)
          else:
              raise RuntimeError(error)
          PY
